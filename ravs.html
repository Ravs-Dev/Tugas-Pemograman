<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemrograman Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <h1>Pemrograman Web</h1>
        <p>Silahkan isi data anda</p>

        <form>
            <input type="email" value="Rio@gmail.com" required>
            <input type="text" value="Rio Revan" required>

            <div class="password-box">
            <input type="password" id="password" value="Gak Tau" required>
            <span id="togglepassword">🙉</span>
            </div>

            <button type="submit" class="masuk">Masuk</button>
            <button type="button" class="daftar">Daftar</button>
        </form>

        <script>
        const password = document.getElementById("password");
        const toggle = document.getElementById("togglePassword");

        toggle.addEventListener("click", () => {
           if (password.type === "password") {
           password.type = "text";
           toggle.innerHTML = "🙈";
           } else {
           password.type = "password";
           toggle.innerHTML = "🙉";
          }
        });
        </script>
    </div>

</body>
</html>
